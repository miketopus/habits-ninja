<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Habits Ninja 🥷</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- ─── HERO COVER ─────────────────────────── -->
<section class="hero">
  <div class="hero__glow hero__glow--1"></div>
  <div class="hero__glow hero__glow--2"></div>
  <div class="hero__glow hero__glow--3"></div>
  <div class="hero__fade"></div>

  <!-- Top-right actions -->
  <div class="hero__actions">
    <div id="weatherChip" class="weather-chip" style="opacity:0.4">
      <span id="weatherIcon">⏳</span>
      <div>
        <div class="weather-chip__temp" id="weatherTemp">—</div>
        <div class="weather-chip__loc">Bogotá</div>
      </div>
    </div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
  </div>

  <!-- Title -->
  <div class="hero__content">
    <h1 class="app-title">Habits ninja 🥷</h1>
    <p class="app-sub">Operation Ninja · Focus, Flow &amp; Fierceness</p>
  </div>
</section>

<!-- ─── MAIN CONTENT ───────────────────────── -->
<div class="app-body">

  <div class="quote-card" style="margin-top:1.5rem">
    <div class="quote-text" id="quoteText" style="font-size:12px;opacity:0.5">Cargando frase del día...</div>
  </div>

  <div class="view-switcher">
    <div class="view-tab active" id="vt-daily"   onclick="setView('daily')">Hoy</div>
    <div class="view-tab"        id="vt-weekly"  onclick="setView('weekly')">Semana</div>
    <div class="view-tab"        id="vt-monthly" onclick="setView('monthly')">Mes</div>
  </div>

  <div class="top-bar">
    <div>
      <div class="period-label" id="periodLabel"></div>
      <div class="period-sub"   id="periodSub"></div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn--sm" onclick="openHistory()">Historial</button>
      <button class="btn btn--sm" onclick="openBlockModal()">+ Bloque</button>
      <button class="btn btn--sm btn--primary" onclick="openHabitModal()">+ Hábito</button>
    </div>
  </div>

  <div class="summary-bar">
    <div class="metric"><div class="metric__val" id="statA">—</div><div class="metric__lbl" id="statAL">Hoy</div></div>
    <div class="metric"><div class="metric__val" id="statB">—</div><div class="metric__lbl" id="statBL">Semana</div></div>
    <div class="metric"><div class="metric__val" id="statC">—</div><div class="metric__lbl" id="statCL">Ítems</div></div>
  </div>

  <div id="viewDaily"></div>
  <div id="viewWeekly"  style="display:none"></div>
  <div id="viewMonthly" style="display:none"></div>

</div><!-- /app-body -->

<!-- ─── FAB ────────────────────────────────── -->
<button id="saveBtn" onclick="openSaveFlow()">
  <span id="saveBtnIcon">💾</span> Guardar
</button>

<!-- ─── ENERGY BAR ─────────────────────────── -->
<div class="energy-bar" id="energyBar">
  <div class="energy-bar__label">¿Cómo arrancas?</div>
  <div class="energy-bar__btns">
    <div class="energy-btn" id="elow"  onclick="setEnergy('low')">😴 Bajo</div>
    <div class="energy-btn" id="emid"  onclick="setEnergy('mid')">😊 Normal</div>
    <div class="energy-btn" id="ehigh" onclick="setEnergy('high')">⚡ Alto</div>
  </div>
  <button class="energy-bar__close" onclick="dismissEnergy()">×</button>
</div>

<!-- ─── MODALS ──────────────────────────────── -->

<div class="overlay" id="pomoModal" style="display:none">
  <div class="modal" style="text-align:center">
    <h3 style="text-align:left">Pomodoro 🍅</h3>
    <div class="pomo-ring">
      <svg width="130" height="130" viewBox="0 0 130 130">
        <circle class="pomo-ring-bg"   cx="65" cy="65" r="56"/>
        <circle class="pomo-ring-fill" id="pomoRingFill" cx="65" cy="65" r="56" stroke="#7F77DD" stroke-dasharray="351.86" stroke-dashoffset="0"/>
      </svg>
      <div class="pomo-time-wrap">
        <div class="pomo-min"   id="pomoTime">25:00</div>
        <div class="pomo-phase" id="pomoPhase">Enfoque</div>
      </div>
    </div>
    <div style="font-size:11px;opacity:.4;margin-bottom:.5rem" id="pomoCount">Pomodoro 1 de 4</div>
    <div class="pomo-dots" id="pomoDots"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin:1rem 0">
      <button class="btn" onclick="pomoReset()">↺ Reset</button>
      <button class="btn btn--primary" id="pomoPlayBtn" onclick="pomoToggle()">▶ Iniciar</button>
      <button class="btn" onclick="pomoSkip()">⏭ Skip</button>
    </div>
    <button class="btn btn--sm" style="width:100%" onclick="closePomodoro()">Cerrar</button>
  </div>
</div>

<div class="overlay" id="historyModal" style="display:none">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <h3 style="margin:0">Historial</h3>
      <button class="btn btn--icon" onclick="closeHistory()">✕</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;margin-bottom:1rem">
      <button class="btn btn--icon btn--sm" onclick="changeHistMonth(-1)">‹</button>
      <span id="histMonthLabel" style="flex:1;text-align:center"></span>
      <button class="btn btn--icon btn--sm" onclick="changeHistMonth(1)">›</button>
    </div>
    <div id="historyContent"></div>
    <div class="modal-footer"><button class="btn" onclick="closeHistory()">Cerrar</button></div>
  </div>
</div>

<div class="overlay" id="habitModal" style="display:none">
  <div class="modal">
    <h3 id="habitModalTitle">Nuevo hábito</h3>
    <div class="field">
      <label>Emoji</label>
      <div class="emoji-row">
        <div class="emoji-preview" id="emojiPreview">✨</div>
        <input id="hEmoji" placeholder="Escribe o pega un emoji" style="flex:1"
               oninput="document.getElementById('emojiPreview').textContent=this.value||'✨'"/>
      </div>
      <div class="emoji-suggestions" id="emojiSugs"></div>
    </div>
    <div class="field"><label>Nombre</label><input id="hName" placeholder="Ej. Meditación"/></div>
    <div class="field"><label>Color</label><div class="color-row" id="colorPicker"></div></div>
    <div class="field"><label>Vincular con bloques</label><div class="link-list" id="linkList"></div></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeHabitModal()">Cancelar</button>
      <button class="btn btn--primary" onclick="saveHabit()">Guardar</button>
    </div>
  </div>
</div>

<div class="overlay" id="blockModal" style="display:none">
  <div class="modal">
    <h3>Nuevo bloque</h3>
    <div class="field"><label>Actividad</label><input id="bName" placeholder="Ej. Ejercicio"/></div>
    <div class="field"><label>Hora</label><input id="bTime" placeholder="Ej. 6:00 AM"/></div>
    <div class="field">
      <label>Días</label>
      <div class="day-check" id="dayPicker">
        <label><input type="checkbox" value="0" checked> Lun</label>
        <label><input type="checkbox" value="1" checked> Mar</label>
        <label><input type="checkbox" value="2" checked> Mié</label>
        <label><input type="checkbox" value="3" checked> Jue</label>
        <label><input type="checkbox" value="4" checked> Vie</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeBlockModal()">Cancelar</button>
      <button class="btn btn--primary" onclick="saveBlock()">Guardar</button>
    </div>
  </div>
</div>

<div class="overlay" id="saveModal" style="display:none">
  <div class="modal">
    <h3 id="saveModalTitle">Guardar progreso</h3>
    <div id="saveModalBody"></div>
  </div>
</div>

<script>
const COLORS=['#7F77DD','#1D9E75','#D85A30','#378ADD','#D4537E','#BA7517','#E24B4A','#5DCAA5','#F0997B'];
const EMOJI_BANK=['📚','🐕','💻','🦮','🏃','🧘','💪','🥗','💧','🌅','✍️','🎯','🗣️','🎵','🧠','😴','🚴','🍎','🎨','📖'];
const DAY_LABELS=['L','M','X','J','V'];
const today=new Date();
const todayDow=(today.getDay()+6)%7;
const todayStr=today.toISOString().slice(0,10);

function getWeekDates(){const m=new Date(today);m.setDate(today.getDate()-todayDow);return Array.from({length:5},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});}
const weekDates=getWeekDates();
const weekStrs=weekDates.map(d=>d.toISOString().slice(0,10));

let habits=[],completions={},blocks=[],blockDone={};
let currentView='daily';
let monthViewYear=today.getFullYear(),monthViewMonth=today.getMonth();
let histYear=today.getFullYear(),histMonth=today.getMonth();
let editingHabitId=null,modalLinkedBlocks=[];

const DEFAULT_HABITS=[
  {id:'h01',name:'Estudiar idiomas',  color:'#7F77DD',emoji:'🗣️',linkedBlocks:['b04','b07']},
  {id:'h02',name:'Entrenamiento Anakin',color:'#1D9E75',emoji:'🐕',linkedBlocks:['b02']},
  {id:'h03',name:'Deep work Rappi',   color:'#378ADD',emoji:'💻',linkedBlocks:['b05','b08']},
  {id:'h04',name:'Caminata con Anakin',color:'#5DCAA5',emoji:'🦮',linkedBlocks:['b06','b10']},
  {id:'h05',name:'Lectura',           color:'#D85A30',emoji:'📖',linkedBlocks:['b12']},
  {id:'h06',name:'Tiempo de diseño',  color:'#D4537E',emoji:'🎨',linkedBlocks:['b13']},
];
const DEFAULT_BLOCKS=[
  {id:'b01',name:'Preparar a sacar a Anakin',    time:'6:00 AM', days:[0,1,2,3,4]},
  {id:'b02',name:'Entrenamiento Anakin',          time:'7:00 AM', days:[0,1,2,3,4]},
  {id:'b03',name:'Desayuno personal y de Anakin', time:'8:00 AM', days:[0,1,2,3,4]},
  {id:'b12',name:'Lectura',                       time:'8:00 AM', days:[0,1,2,3,4]},
  {id:'b04',name:'Estudiar idiomas',              time:'8:30 AM', days:[0,1,2,3,4]},
  {id:'b05',name:'Deep work Rappi',               time:'9:00 AM', days:[0,1,2,3,4],auto:true,pomo:true},
  {id:'b06',name:'Paseo corto Anakin',            time:'1:00 PM', days:[0,1,2,3,4]},
  {id:'b07',name:'Repaso idiomas + Almuerzo',     time:'1:30 PM', days:[0,1,2,3,4]},
  {id:'b08',name:'Deep work Rappi',               time:'2:00 PM', days:[0,1,2,3,4],auto:true,pomo:true},
  {id:'b09',name:'Break / estiramiento',          time:'6:00 PM', days:[0,1,2,3,4]},
  {id:'b10',name:'Caminata con Anakin',           time:'7:00 PM', days:[0,1,2,3,4]},
  {id:'b11',name:'Cena + Proyectos personales',   time:'8:10 PM', days:[0,1,2,3]},
  {id:'b13',name:'Tiempo de diseño',              time:'9:00 PM', days:[0,1,2,3,4]},
];

// ── Storage ────────────────────────────────────────────────
const ls={
  get:(k)=>{try{return localStorage.getItem(k);}catch(e){return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}},
  del:(k)=>{try{localStorage.removeItem(k);}catch(e){}},
};

// ── Theme toggle ───────────────────────────────────────────
function initTheme(){
  const saved=ls.get('theme')||'dark';
  document.documentElement.setAttribute('data-theme',saved);
  document.getElementById('themeToggle').textContent=saved==='dark'?'🌙':'☀️';
}
function toggleTheme(){
  const current=document.documentElement.getAttribute('data-theme');
  const next=current==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('themeToggle').textContent=next==='dark'?'🌙':'☀️';
  ls.set('theme',next);
}

function load(){
  initTheme();
  try{const h=ls.get('habits');  const p=h?JSON.parse(h):[];habits=p.length?p:DEFAULT_HABITS;}catch(e){habits=DEFAULT_HABITS;}
  try{completions=JSON.parse(ls.get('completions')||'{}');}catch(e){completions={};}
  try{const b=ls.get('blocks');  const p=b?JSON.parse(b):[];blocks=p.length?p:DEFAULT_BLOCKS;}catch(e){blocks=DEFAULT_BLOCKS;}
  try{blockDone=JSON.parse(ls.get('blockDone')||'{}');}catch(e){blockDone={};}
  migrate();loadEnergy();loadQuote();loadWeather();render();
}
function save(){ls.set('habits',JSON.stringify(habits));ls.set('completions',JSON.stringify(completions));}
function saveBlocks(){ls.set('blocks',JSON.stringify(blocks));ls.set('blockDone',JSON.stringify(blockDone));}

function migrate(){
  let ch=false;
  [{id:'b12',name:'Lectura',time:'8:00 AM',days:[0,1,2,3,4]},{id:'b13',name:'Tiempo de diseño',time:'9:00 PM',days:[0,1,2,3,4]}]
    .forEach(nb=>{if(!blocks.find(b=>b.id===nb.id)){blocks.push(nb);ch=true;}});
  [{id:'h05',name:'Lectura',color:'#D85A30',emoji:'📖',linkedBlocks:['b12']},{id:'h06',name:'Tiempo de diseño',color:'#D4537E',emoji:'🎨',linkedBlocks:['b13']}]
    .forEach(nh=>{if(!habits.find(h=>h.id===nh.id)){habits.push(nh);ch=true;}});
  if(ch){saveBlocks();save();}
}

function syncLinkedHabits(blockId,dateStr){
  const dow=(new Date(dateStr).getDay()+6)%7;
  habits.forEach(h=>{
    if(!(h.linkedBlocks||[]).includes(blockId))return;
    const linked=(h.linkedBlocks||[]).filter(bid=>{const b=blocks.find(x=>x.id===bid);return b&&b.days.includes(dow);});
    const allDone=linked.every(bid=>{const b=blocks.find(x=>x.id===bid);return b&&(b.auto||!!blockDone[`block_${bid}_${dateStr}`]);});
    const key=`${h.id}_${dateStr}`;
    if(allDone)completions[key]=1;else delete completions[key];
  });
}

// ── Weather ────────────────────────────────────────────────
async function loadWeather(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=4.6097&longitude=-74.0817&current=temperature_2m,weathercode&timezone=America/Bogota');
    const d=await r.json();
    document.getElementById('weatherIcon').textContent=wIcon(d.current.weathercode);
    document.getElementById('weatherTemp').textContent=Math.round(d.current.temperature_2m)+'°C';
    document.getElementById('weatherChip').style.opacity='1';
  }catch(e){}
}
function wIcon(c){if(c===0)return'☀️';if(c<=3)return'⛅';if(c<=48)return'🌫️';if(c<=67)return'🌧️';if(c<=77)return'🌨️';if(c<=82)return'🌦️';return'⛈️';}

// ── Quote ──────────────────────────────────────────────────
async function loadQuote(){
  const key='quote_'+todayStr;
  const cached=ls.get(key);
  if(cached){setQuote(cached);return;}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:80,messages:[{role:'user',content:'Genera UNA frase motivacional corta (máximo 12 palabras) en español sobre enfoque, disciplina o hábitos. Estilo ninja/guerrero. Solo la frase, sin comillas ni explicación.'}]})});
    const data=await res.json();
    const q=data.content?.[0]?.text?.trim()||'La disciplina es el puente entre metas y logros.';
    ls.set(key,q);setQuote(q);
  }catch(e){setQuote('La disciplina es el puente entre metas y logros.');}
}
function setQuote(q){const el=document.getElementById('quoteText');el.textContent='"'+q+'"';el.style.opacity='0.75';el.style.fontSize='';}

// ── Energy ─────────────────────────────────────────────────
function loadEnergy(){
  if(ls.get('energy_dismissed_'+todayStr)){document.getElementById('energyBar').classList.add('hidden');return;}
  const e=ls.get('energy_'+todayStr);if(e)applyEnergy(e);
}
function setEnergy(l){applyEnergy(l);ls.set('energy_'+todayStr,l);}
function applyEnergy(l){['low','mid','high'].forEach(x=>{document.getElementById('e'+x).className='energy-btn'+(l===x?' sel-'+x:'');});}
function dismissEnergy(){document.getElementById('energyBar').classList.add('hidden');ls.set('energy_dismissed_'+todayStr,'1');}

// ── Pomodoro ───────────────────────────────────────────────
const POMO_WORK=25*60,POMO_BREAK=5*60,POMO_TOTAL=4;
let pomo={running:false,phase:'work',remaining:POMO_WORK,session:1,interval:null};
const circ=2*Math.PI*56;
function openPomodoro(){renderPomoRing();document.getElementById('pomoModal').style.display='flex';}
function closePomodoro(){document.getElementById('pomoModal').style.display='none';}
function pomoToggle(){
  if(pomo.running){clearInterval(pomo.interval);pomo.running=false;document.getElementById('pomoPlayBtn').textContent='▶ Continuar';}
  else{pomo.running=true;document.getElementById('pomoPlayBtn').textContent='⏸ Pausar';pomo.interval=setInterval(()=>{
    pomo.remaining--;
    if(pomo.remaining<=0){clearInterval(pomo.interval);pomo.running=false;if(pomo.phase==='work'){pomo.phase='break';pomo.remaining=POMO_BREAK;}else{pomo.session=Math.min(pomo.session+1,POMO_TOTAL);pomo.phase='work';pomo.remaining=POMO_WORK;}document.getElementById('pomoPlayBtn').textContent='▶ Iniciar';}
    renderPomoRing();
  },1000);}
  renderPomoRing();
}
function pomoReset(){clearInterval(pomo.interval);pomo={running:false,phase:'work',remaining:POMO_WORK,session:1,interval:null};document.getElementById('pomoPlayBtn').textContent='▶ Iniciar';renderPomoRing();}
function pomoSkip(){clearInterval(pomo.interval);pomo.running=false;document.getElementById('pomoPlayBtn').textContent='▶ Iniciar';if(pomo.phase==='work'){pomo.phase='break';pomo.remaining=POMO_BREAK;}else{pomo.session=Math.min(pomo.session+1,POMO_TOTAL);pomo.phase='work';pomo.remaining=POMO_WORK;}renderPomoRing();}
function renderPomoRing(){
  const total=pomo.phase==='work'?POMO_WORK:POMO_BREAK;
  document.getElementById('pomoRingFill').style.strokeDashoffset=circ*(1-pomo.remaining/total);
  document.getElementById('pomoRingFill').style.stroke=pomo.phase==='work'?'#7F77DD':'#1D9E75';
  const m=String(Math.floor(pomo.remaining/60)).padStart(2,'0'),s=String(pomo.remaining%60).padStart(2,'0');
  document.getElementById('pomoTime').textContent=m+':'+s;
  document.getElementById('pomoPhase').textContent=pomo.phase==='work'?'Enfoque':'Descanso';
  document.getElementById('pomoCount').textContent=`Pomodoro ${pomo.session} de ${POMO_TOTAL}`;
  const dots=document.getElementById('pomoDots');dots.innerHTML='';
  for(let i=0;i<POMO_TOTAL;i++){const d=document.createElement('div');d.className='pomo-dot'+(i<pomo.session-1||(i===pomo.session-1&&pomo.phase==='break')?' done':'');dots.append(d);}
}

// ── Helpers ────────────────────────────────────────────────
function toMin(t){const[hm,ap]=t.split(' ');let[h,m]=hm.split(':').map(Number);if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+m;}
function getStreak(h){let n=0,d=new Date(today);while(true){const s=d.toISOString().slice(0,10);if(!completions[`${h.id}_${s}`])break;n++;d.setDate(d.getDate()-1);}return n;}

// ── Views ──────────────────────────────────────────────────
function setView(v){
  currentView=v;
  ['daily','weekly','monthly'].forEach(x=>{
    document.getElementById('vt-'+x).classList.toggle('active',x===v);
    document.getElementById('view'+x.charAt(0).toUpperCase()+x.slice(1)).style.display=x===v?'block':'none';
  });
  render();
}
function render(){if(currentView==='daily')renderDaily();else if(currentView==='weekly')renderWeekly();else renderMonthly();}

// ── DAILY ──────────────────────────────────────────────────
function renderDaily(){
  const dayName=today.toLocaleDateString('es',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('periodLabel').textContent=dayName.charAt(0).toUpperCase()+dayName.slice(1);
  document.getElementById('periodSub').textContent='Vista diaria';
  const sorted=[...blocks].sort((a,b)=>toMin(a.time)-toMin(b.time)).filter(b=>b.days.includes(todayDow));
  let done=0,total=sorted.length+habits.length;
  sorted.forEach(b=>{if(b.auto||blockDone[`block_${b.id}_${todayStr}`])done++;});
  habits.forEach(h=>{if(completions[`${h.id}_${todayStr}`])done++;});
  document.getElementById('statA').textContent=`${done}/${total}`;document.getElementById('statAL').textContent='Completado hoy';
  document.getElementById('statB').textContent=Math.round(done/Math.max(total,1)*100)+'%';document.getElementById('statBL').textContent='Progreso';
  document.getElementById('statC').textContent=habits.length;document.getElementById('statCL').textContent='Hábitos activos';
  const wrap=document.createElement('div');wrap.className='daily-wrap';
  const bHdr=document.createElement('div');bHdr.className='section-hdr';bHdr.textContent='Rutina de hoy';wrap.append(bHdr);
  sorted.forEach(b=>{
    const key=`block_${b.id}_${todayStr}`;const isDone=b.auto||!!blockDone[key];
    const row=document.createElement('div');row.className='daily-row'+(isDone?' done-row':'');
    const chk=document.createElement('div');chk.className='daily-chk'+(isDone?' checked':'')+(b.auto?' auto-chk':'');
    if(isDone)chk.style.background=b.auto?'rgba(255,255,255,0.1)':'#1D9E75';chk.innerHTML=isDone?'✓':'';
    if(!b.auto)chk.onclick=()=>{if(blockDone[key])delete blockDone[key];else blockDone[key]=1;syncLinkedHabits(b.id,todayStr);saveBlocks();save();render();};
    const em=document.createElement('div');em.className='daily-emoji';em.textContent=b.auto?'⚡':'▸';
    const nm=document.createElement('div');nm.className='daily-name'+(isDone?' crossed':'');nm.textContent=b.name;
    const tm=document.createElement('div');tm.className='daily-time';tm.textContent=b.time;
    if(b.pomo){const pb=document.createElement('span');pb.className='pomo-btn';pb.textContent='🍅';pb.style.marginLeft='4px';pb.onclick=e=>{e.stopPropagation();openPomodoro();};tm.append(pb);}
    row.append(chk,em,nm,tm);wrap.append(row);
  });
  const hHdr=document.createElement('div');hHdr.className='section-hdr';hHdr.textContent='Hábitos de hoy';wrap.append(hHdr);
  habits.forEach(h=>{
    const key=`${h.id}_${todayStr}`;const isDone=!!completions[key];
    const row=document.createElement('div');row.className='daily-row'+(isDone?' done-row':'');
    const chk=document.createElement('div');chk.className='daily-chk'+(isDone?' checked':'');
    if(isDone)chk.style.background=h.color;chk.innerHTML=isDone?'✓':'';
    chk.onclick=()=>{if(completions[key])delete completions[key];else completions[key]=1;save();render();};
    const em=document.createElement('div');em.className='daily-emoji';em.textContent=h.emoji||'⭐';
    const nm=document.createElement('div');nm.className='daily-name'+(isDone?' crossed':'');nm.textContent=h.name;
    const sv=getStreak(h);const st=document.createElement('div');st.className='daily-time';st.textContent=sv>0?`${sv} días 🔥`:'';
    row.append(chk,em,nm,st);wrap.append(row);
  });
  document.getElementById('viewDaily').innerHTML='';document.getElementById('viewDaily').append(wrap);
}

// ── WEEKLY ─────────────────────────────────────────────────
function renderWeekly(){
  const monStr=weekDates[0].toLocaleDateString('es',{day:'numeric',month:'short'});
  const friStr=weekDates[4].toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('periodLabel').textContent=`${monStr} – ${friStr}`;
  document.getElementById('periodSub').textContent='Vista semanal';
  const blockHabitMap={};
  habits.forEach(h=>(h.linkedBlocks||[]).forEach(bid=>{blockHabitMap[bid]=blockHabitMap[bid]||[];blockHabitMap[bid].push(h);}));
  let todayDone=0,todayTotal=0,weekDone=0,weekTotal=0;
  const cont=document.getElementById('viewWeekly');cont.innerHTML='';
  const tw=document.createElement('div');tw.className='table-wrap';
  const head=document.createElement('div');head.className='table-head';
  const actLbl=document.createElement('div');actLbl.style.cssText='font-size:11px;opacity:.4';actLbl.textContent='Actividad';head.append(actLbl);
  DAY_LABELS.forEach((_,i)=>{const th=document.createElement('div');th.className='th'+(i===todayDow?' today':'');th.textContent=DAY_LABELS[i];head.append(th);});
  head.append(document.createElement('div'));tw.append(head);
  function addSection(label){const h=document.createElement('div');h.className='section-hdr';h.textContent=label;tw.append(h);}
  addSection('Rutina diaria');
  [...blocks].sort((a,b)=>toMin(a.time)-toMin(b.time)).forEach(b=>{
    const info=document.createElement('div');info.className='row-info';
    const dot=document.createElement('div');dot.className='row-dot';dot.style.background='rgba(255,255,255,0.2)';
    const nw=document.createElement('div');nw.style.minWidth='0';
    const nm=document.createElement('div');nm.className='row-name';nm.textContent=b.name;
    const meta=document.createElement('div');meta.className='row-meta';meta.textContent=b.time+(b.auto?' — auto':'');
    if(b.pomo){const pb=document.createElement('span');pb.className='pomo-btn';pb.textContent='🍅';pb.onclick=e=>{e.stopPropagation();openPomodoro();};meta.append(pb);}
    (blockHabitMap[b.id]||[]).forEach(h=>{const ba=document.createElement('span');ba.className='link-badge';ba.textContent=(h.emoji||'')+'→'+h.name;meta.append(ba);});
    nw.append(nm,meta);
    const del=document.createElement('button');del.className='btn btn--icon btn--ghost row-del';del.innerHTML='×';del.onclick=()=>deleteBlock(b.id);
    info.append(dot,nw,del);
    const row=document.createElement('div');row.className='row';row.append(info);
    let rDone=0,rApply=0;
    for(let di=0;di<5;di++){
      const applies=b.days.includes(di),dateStr=weekStrs[di],key=`block_${b.id}_${dateStr}`;
      const isDone=b.auto||!!blockDone[key];
      const chk=document.createElement('div');
      let cls='chk';if(!applies)cls+=' na';else if(b.auto)cls+=' auto-chk checked';else{if(isDone)cls+=' checked';if(di===todayDow)cls+=' today-chk';}
      chk.className=cls;chk.innerHTML=(isDone||b.auto)?'✓':'';
      if(applies&&!b.auto)chk.onclick=()=>{if(blockDone[key])delete blockDone[key];else blockDone[key]=1;syncLinkedHabits(b.id,dateStr);saveBlocks();save();render();};
      row.append(chk);
      if(applies){rApply++;if(isDone)rDone++;weekTotal++;if(isDone)weekDone++;if(di===todayDow){todayTotal++;if(isDone)todayDone++;}}
    }
    row.append(document.createElement('div'));
    if(rApply>0&&rDone===rApply)row.classList.add('done-row');
    tw.append(row);
  });
  addSection('Hábitos');
  habits.forEach(h=>{
    const info=document.createElement('div');info.className='row-info';
    const ew=document.createElement('div');ew.style.cssText='width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px';ew.textContent=h.emoji||'⭐';
    const nw=document.createElement('div');nw.style.minWidth='0';
    const nm=document.createElement('div');nm.className='row-name';nm.textContent=h.name;
    const meta=document.createElement('div');meta.className='row-meta';
    const sv=getStreak(h);if(sv>0)meta.textContent=`${sv}d 🔥`;
    (h.linkedBlocks||[]).forEach(bid=>{const b=blocks.find(x=>x.id===bid);if(!b)return;const ba=document.createElement('span');ba.className='link-badge';ba.textContent='⏱'+b.time;meta.append(ba);});
    nw.append(nm,meta);
    const del=document.createElement('button');del.className='btn btn--icon btn--ghost row-del';del.innerHTML='×';del.onclick=()=>deleteHabit(h.id);
    info.append(ew,nw,del);
    const row=document.createElement('div');row.className='row';row.append(info);
    let hDone=0;
    for(let di=0;di<5;di++){
      const key=`${h.id}_${weekStrs[di]}`,isDone=!!completions[key];
      const chk=document.createElement('div');chk.className='chk'+(isDone?' checked':'')+(di===todayDow?' today-chk':'');
      if(isDone)chk.style.background=h.color;chk.innerHTML=isDone?'✓':'';
      chk.onclick=()=>{if(completions[key])delete completions[key];else completions[key]=1;save();render();};
      row.append(chk);weekTotal++;if(isDone)weekDone++;todayTotal++;if(di===todayDow&&isDone)todayDone++;
    }
    row.append(document.createElement('div'));
    if(hDone===5)row.classList.add('done-row');
    tw.append(row);
  });
  cont.append(tw);
  document.getElementById('statA').textContent=`${todayDone}/${todayTotal}`;document.getElementById('statAL').textContent='Hoy completado';
  document.getElementById('statB').textContent=weekTotal>0?Math.round(weekDone/weekTotal*100)+'%':'—';document.getElementById('statBL').textContent='Esta semana';
  document.getElementById('statC').textContent=blocks.length+habits.length;document.getElementById('statCL').textContent='Total ítems';
}

// ── MONTHLY ────────────────────────────────────────────────
function renderMonthly(){
  const lbl=new Date(monthViewYear,monthViewMonth,1).toLocaleString('es',{month:'long',year:'numeric'});
  document.getElementById('periodLabel').textContent=lbl.charAt(0).toUpperCase()+lbl.slice(1);
  document.getElementById('periodSub').textContent='Vista mensual';
  const dim=new Date(monthViewYear,monthViewMonth+1,0).getDate();
  const firstDow=(new Date(monthViewYear,monthViewMonth,1).getDay()+6)%7;
  const isCurr=monthViewYear===today.getFullYear()&&monthViewMonth===today.getMonth();
  let totalDone=0,totalPossible=0;
  const wrap=document.createElement('div');wrap.className='monthly-wrap';
  const nav=document.createElement('div');nav.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:.75rem';
  const prev=document.createElement('button');prev.className='btn btn--icon btn--sm';prev.textContent='‹';prev.onclick=()=>{monthViewMonth--;if(monthViewMonth<0){monthViewMonth=11;monthViewYear--;}render();};
  const next=document.createElement('button');next.className='btn btn--icon btn--sm';next.textContent='›';next.onclick=()=>{monthViewMonth++;if(monthViewMonth>11){monthViewMonth=0;monthViewYear++;}render();};
  const cur=document.createElement('button');cur.className='btn btn--sm';cur.textContent='Hoy';cur.onclick=()=>{monthViewYear=today.getFullYear();monthViewMonth=today.getMonth();render();};
  nav.append(prev,next,cur);wrap.append(nav);
  habits.forEach(h=>{
    const card=document.createElement('div');card.className='monthly-habit';
    const title=document.createElement('div');title.className='monthly-title';
    const emo=document.createElement('div');emo.className='monthly-emoji';emo.textContent=h.emoji||'⭐';
    const nm=document.createElement('div');nm.className='monthly-name';nm.textContent=h.name;
    const pctEl=document.createElement('div');pctEl.className='monthly-pct';
    title.append(emo,nm,pctEl);
    const grid=document.createElement('div');grid.className='mcal';
    ['L','M','X','J','V','S','D'].forEach(d=>{const c=document.createElement('div');c.className='mcal-h';c.textContent=d;grid.append(c);});
    for(let i=0;i<firstDow;i++){const c=document.createElement('div');c.className='mcal-d mcal-empty';grid.append(c);}
    let mc=0,mt=0;
    for(let d=1;d<=dim;d++){
      const ds=`${monthViewYear}-${String(monthViewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isDone=!!completions[`${h.id}_${ds}`];
      const c=document.createElement('div');c.className='mcal-d'+(isDone?' mcal-done':'');
      if(isCurr&&d===today.getDate())c.classList.add('mcal-today');
      if(isDone)c.style.background=h.color;c.textContent=d;
      c.onclick=()=>{const k=`${h.id}_${ds}`;if(completions[k])delete completions[k];else completions[k]=1;save();render();};
      grid.append(c);mt++;if(isDone)mc++;
    }
    const pct=mt>0?Math.round(mc/mt*100):0;pctEl.textContent=pct+'%';
    const pb=document.createElement('div');pb.className='mpbar';
    const pf=document.createElement('div');pf.className='mpbar-fill';pf.style.cssText=`width:${pct}%;background:${h.color}`;pb.append(pf);
    card.append(title,grid,pb);wrap.append(card);totalDone+=mc;totalPossible+=mt;
  });
  document.getElementById('viewMonthly').innerHTML='';document.getElementById('viewMonthly').append(wrap);
  const op=totalPossible>0?Math.round(totalDone/totalPossible*100):0;
  document.getElementById('statA').textContent=op+'%';document.getElementById('statAL').textContent='Cumplimiento mes';
  document.getElementById('statB').textContent=totalDone;document.getElementById('statBL').textContent='Días completados';
  document.getElementById('statC').textContent=habits.length;document.getElementById('statCL').textContent='Hábitos activos';
}

function deleteBlock(id){blocks=blocks.filter(b=>b.id!==id);saveBlocks();render();}
function deleteHabit(id){habits=habits.filter(h=>h.id!==id);save();render();}

function openHistory(){histYear=today.getFullYear();histMonth=today.getMonth();renderHistory();document.getElementById('historyModal').style.display='flex';}
function closeHistory(){document.getElementById('historyModal').style.display='none';}
function changeHistMonth(d){histMonth+=d;if(histMonth<0){histMonth=11;histYear--;}if(histMonth>11){histMonth=0;histYear++;}renderHistory();}
function renderHistory(){
  const lbl=new Date(histYear,histMonth,1).toLocaleString('es',{month:'long',year:'numeric'});
  document.getElementById('histMonthLabel').textContent=lbl.charAt(0).toUpperCase()+lbl.slice(1);
  const content=document.getElementById('historyContent');content.innerHTML='';
  const dim=new Date(histYear,histMonth+1,0).getDate(),firstDow=(new Date(histYear,histMonth,1).getDay()+6)%7;
  if(!habits.length){content.innerHTML='<p style="font-size:13px;opacity:.3;text-align:center;padding:1rem">Sin hábitos</p>';return;}
  habits.forEach(h=>{
    const wrap=document.createElement('div');wrap.style.cssText='background:var(--bg-card);border:0.5px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px';
    const hn=document.createElement('div');hn.style.cssText='font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:6px;color:var(--text-1)';
    hn.append(document.createTextNode((h.emoji||'⭐')+' '+h.name));
    const grid=document.createElement('div');grid.className='mcal';
    ['L','M','X','J','V','S','D'].forEach(d=>{const c=document.createElement('div');c.className='mcal-h';c.textContent=d;grid.append(c);});
    for(let i=0;i<firstDow;i++){const c=document.createElement('div');c.className='mcal-d mcal-empty';grid.append(c);}
    let mc=0,mt=0;
    for(let d=1;d<=dim;d++){
      const ds=`${histYear}-${String(histMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isDone=!!completions[`${h.id}_${ds}`];
      const c=document.createElement('div');c.className='mcal-d'+(isDone?' mcal-done':'');
      if(histYear===today.getFullYear()&&histMonth===today.getMonth()&&d===today.getDate())c.classList.add('mcal-today');
      if(isDone)c.style.background=h.color;c.textContent=d;
      c.onclick=()=>{const k=`${h.id}_${ds}`;if(completions[k])delete completions[k];else completions[k]=1;save();renderHistory();render();};
      grid.append(c);mt++;if(isDone)mc++;
    }
    const pct=mt>0?Math.round(mc/mt*100):0;
    const pb=document.createElement('div');pb.style.cssText='height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px';
    const pf=document.createElement('div');pf.style.cssText=`width:${pct}%;height:100%;border-radius:2px;background:${h.color}`;pb.append(pf);
    const pl=document.createElement('div');pl.style.cssText='font-size:10px;color:var(--text-3);text-align:right;margin-top:3px';pl.textContent=pct+'% completado';
    wrap.append(hn,grid,pb,pl);content.append(wrap);
  });
}

  document.getElementById('habitModalTitle').textContent=h?'Editar hábito':'Nuevo hábito';
  document.getElementById('hName').value=h?h.name:'';
  document.getElementById('hEmoji').value=h?h.emoji:'';

  modalLinkedBlocks=[...(h?.linkedBlocks||[])];
  const sugs=document.getElementById('emojiSugs');sugs.innerHTML='';
  EMOJI_BANK.forEach(e=>{const s=document.createElement('div');s.className='emoji-sug';s.textContent=e;s.onclick=()=>{document.getElementById('hEmoji').value=e;document.getElementById('emojiPreview').textContent=e;};sugs.append(s);});
  const picker=document.getElementById('colorPicker');picker.innerHTML='';
  COLORS.forEach(c=>{const s=document.createElement('div');s.className='color-swatch'+((!h&&c===COLORS[0])||(h&&h.color===c)?' selected':'');s.style.cssText=`background:${c};box-shadow:0 2px 6px ${c}66`;s.onclick=()=>{picker.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('selected'));s.classList.add('selected');};picker.append(s);});

function renderLinkList(){
  const ll=document.getElementById('linkList');ll.innerHTML='';
  const sorted=[...blocks].sort((a,b)=>toMin(a.time)-toMin(b.time));
  if(!sorted.length){ll.innerHTML='<div style="font-size:12px;opacity:.3;padding:6px">No hay bloques aún.</div>';return;}
  sorted.forEach(b=>{
    const linked=modalLinkedBlocks.includes(b.id);
    const item=document.createElement('div');item.className='link-item'+(linked?' linked':'');
    const chk=document.createElement('div');chk.className='link-chk';chk.innerHTML=linked?'✓':'';
    const nm=document.createElement('div');nm.className='link-item-name';nm.textContent=b.name;
    const tm=document.createElement('div');tm.className='link-item-time';tm.textContent=b.time;
    item.append(chk,nm,tm);
    item.onclick=()=>{if(modalLinkedBlocks.includes(b.id))modalLinkedBlocks=modalLinkedBlocks.filter(x=>x!==b.id);else modalLinkedBlocks.push(b.id);renderLinkList();};
    ll.append(item);
  });
}
function closeHabitModal(){document.getElementById('habitModal').style.display='none';editingHabitId=null;modalLinkedBlocks=[];}
function saveHabit(){
  const name=document.getElementById('hName').value.trim();if(!name)return;
  const emoji=document.getElementById('hEmoji').value.trim()||'⭐';
  const color=document.querySelector('#colorPicker .color-swatch.selected')?.style.background||COLORS[0];
  if(editingHabitId){const h=habits.find(x=>x.id===editingHabitId);if(h){h.name=name;h.emoji=emoji;h.color=color;h.linkedBlocks=[...modalLinkedBlocks];}}
  else habits.push({id:'h'+Date.now(),name,emoji,color,linkedBlocks:[...modalLinkedBlocks]});
  closeHabitModal();save();render();
}

function closeBlockModal(){document.getElementById('blockModal').style.display='none';}

// ── GitHub Save ────────────────────────────────────────────
function getGHConfig(){try{const c=ls.get('gh_config');return c?JSON.parse(c):null;}catch(e){return null;}}
function setGHConfig(cfg){ls.set('gh_config',JSON.stringify(cfg));}
function buildDailySnapshot(){
  const todayBlocks=[...blocks].filter(b=>b.days.includes(todayDow));
  const completedBlocks=todayBlocks.filter(b=>b.auto||!!blockDone[`block_${b.id}_${todayStr}`]);
  const completedHabits=habits.filter(h=>!!completions[`${h.id}_${todayStr}`]);
  const el=document.querySelector('.energy-btn.sel-low,.energy-btn.sel-mid,.energy-btn.sel-high');
  return{date:todayStr,energy:el?el.textContent.trim():'—',routine:{total:todayBlocks.length,completed:completedBlocks.length,items:completedBlocks.map(b=>({name:b.name,time:b.time}))},habits:{total:habits.length,completed:completedHabits.length,items:completedHabits.map(h=>({name:h.name,emoji:h.emoji,streak:getStreak(h)}))},completion_pct:Math.round((completedBlocks.length+completedHabits.length)/Math.max(todayBlocks.length+habits.length,1)*100)};
}
function renderSummaryHTML(snap){
  return`<div class="progress-summary">
    <div>📅 <strong>${snap.date}</strong> · ${snap.completion_pct}% completado</div>
    <div>🔋 Energía: <strong>${snap.energy}</strong></div>
    <div>⏱ Rutina: <strong>${snap.routine.completed}/${snap.routine.total}</strong> bloques</div>
    <div>🎯 Hábitos: <strong>${snap.habits.completed}/${snap.habits.total}</strong></div>
    ${snap.habits.items.map(h=>`<div style="margin-left:12px">${h.emoji} ${h.name}${h.streak>1?' · 🔥'+h.streak+'d':''}</div>`).join('')}
  </div>`;
}
async function openSaveFlow(){
  const modal=document.getElementById('saveModal');
  const body=document.getElementById('saveModalBody');
  document.getElementById('saveModalTitle').textContent='Guardar progreso';
  modal.style.display='flex';
  body.innerHTML='<div style="text-align:center;padding:1rem;opacity:.4;font-size:13px">Cargando...</div>';
  const cfg=getGHConfig();const snap=buildDailySnapshot();
  if(!cfg){
    document.getElementById('saveModalTitle').textContent='Configurar GitHub';
    body.innerHTML=`
      <p style="font-size:12px;color:var(--text-2);margin-bottom:1rem;line-height:1.6">Conecta tu repo para guardar como <code style="background:var(--bg-card-md);padding:1px 5px;border-radius:4px">progress/${todayStr}.json</code>.</p>
      <div class="gh-field"><label>Usuario de GitHub</label><input id="ghUser" placeholder="ej. tuusuario"/></div>
      <div class="gh-field"><label>Repositorio</label><input id="ghRepo" placeholder="ej. habit-ninja"/></div>
      <div class="gh-field"><label>Personal Access Token</label><input id="ghToken" type="password" placeholder="ghp_xxxxxxxxxxxx"/></div>
      <p style="font-size:10px;color:var(--text-3);margin-bottom:1rem">GitHub → Settings → Developer Settings → PAT (classic) → scope <strong>repo</strong>.</p>
      <div id="ghConfigStatus"></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeSaveModal()">Cancelar</button>
        <button class="btn btn--primary" onclick="saveGHConfig()">Conectar →</button>
      </div>`;
  }else{
    body.innerHTML=`
      ${renderSummaryHTML(snap)}
      <p style="font-size:11px;color:var(--text-3);margin-bottom:12px">Repo: <strong style="color:var(--text-2)">${cfg.user}/${cfg.repo}</strong></p>
      <div id="saveResult"></div>
      <div class="modal-footer" style="flex-direction:column;gap:8px">
        <div style="display:flex;gap:8px;width:100%">
          <button class="btn" style="flex:1" onclick="closeSaveModal()">Cancelar</button>
          <button class="btn btn--primary" style="flex:1" onclick="commitToGitHub()">💾 Guardar en GitHub</button>
        </div>
        <button class="btn btn--sm" style="width:100%;font-size:11px;opacity:.4" onclick="clearGHConfig()">Cambiar configuración</button>
      </div>`;
  }

function saveGHConfig(){
  const user=document.getElementById('ghUser')?.value.trim();
  const repo=document.getElementById('ghRepo')?.value.trim();
  const token=document.getElementById('ghToken')?.value.trim();
  const status=document.getElementById('ghConfigStatus');
  if(!user||!repo||!token){if(status)status.innerHTML='<div class="save-status save-err">Completa todos los campos.</div>';return;}
  setGHConfig({user,repo,token});openSaveFlow();
}
function clearGHConfig(){ls.del('gh_config');openSaveFlow();}
async function commitToGitHub(){
  const cfg=getGHConfig();if(!cfg)return;
  const snap=buildDailySnapshot();
  const path=`progress/${todayStr}.json`;
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(snap,null,2))));
  const result=document.getElementById('saveResult');
  result.innerHTML='<div class="save-status" style="background:rgba(120,110,240,0.1);border:0.5px solid rgba(160,150,255,0.25);color:#c5c0ff">Guardando...</div>';
  document.getElementById('saveBtn').classList.add('saving');
  try{
    let sha;
    try{const check=await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`,{headers:{Authorization:`token ${cfg.token}`,Accept:'application/vnd.github.v3+json'}});if(check.ok){const d=await check.json();sha=d.sha;}}catch(e){}
    const body={message:`🥷 Progreso ${todayStr} (${snap.completion_pct}%)`,content};if(sha)body.sha=sha;
    const res=await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`,{method:'PUT',headers:{Authorization:`token ${cfg.token}`,'Content-Type':'application/json',Accept:'application/vnd.github.v3+json'},body:JSON.stringify(body)});
    if(res.ok){
      result.innerHTML=`<div class="save-status save-ok">✓ Guardado en <strong>${cfg.user}/${cfg.repo}</strong><br><span style="font-size:11px;opacity:.7">${path}</span></div>`;
      document.getElementById('saveBtnIcon').textContent='✓';
      setTimeout(()=>document.getElementById('saveBtnIcon').textContent='💾',3000);
    }else{const err=await res.json();result.innerHTML=`<div class="save-status save-err">Error: ${err.message}</div>`;}
  }catch(e){result.innerHTML='<div class="save-status save-err">Error de red. Revisa tu token y repo.</div>';}
  document.getElementById('saveBtn').classList.remove('saving');
}
function closeSaveModal(){document.getElementById('saveModal').style.display='none';}

document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o){closeHabitModal();closeBlockModal();closeHistory();closePomodoro();closeSaveModal();}}));
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeHabitModal();closeBlockModal();closeHistory();closePomodoro();closeSaveModal();}});
load();
</script>
</body>
